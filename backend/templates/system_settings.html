{% extends "base.html" %}
{% block title %}System Settings{% endblock %}

{% block content %}

<h2 class="mb-4">System Configuration</h2>

<div class="card shadow p-4">

<form>

<div class="mb-3">
<label>Campus Radius (meters)</label>
<input type="number" class="form-control" value="200">
</div>

<div class="mb-3">
<label>QR Expiry Time (minutes)</label>
<input type="number" class="form-control" value="30">
</div>

<div class="mb-3">
<label>Face Recognition Threshold</label>
<input type="number" step="0.01" class="form-control" value="0.45">
</div>

<button class="btn btn-primary">Save Settings</button>

</form>

</div>

{% endblock %}
