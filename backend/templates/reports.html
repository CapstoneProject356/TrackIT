{% extends "base.html" %}

{% block title %}Reports - TrackIT{% endblock %}

{% block content %}
<h2 class="text-center mb-4">Attendance Reports</h2>

<div class="row">
    <div class="col-md-4 mb-3">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h5 class="card-title">Daily Report</h5>
                <button class="btn btn-primary">View</button>
            </div>
        </div>
    </div>

    <div class="col-md-4 mb-3">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h5 class="card-title">Weekly Report</h5>
                <button class="btn btn-success">View</button>
            </div>
        </div>
    </div>

    <div class="col-md-4 mb-3">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h5 class="card-title">Monthly Report</h5>
                <button class="btn btn-warning">View</button>
            </div>
        </div>
    </div>
</div>

<div id="reportTable" class="mt-4"></div>
{% endblock %}
