{% extends "base.html" %}

{% block title %}Reports - TrackIT{% endblock %}

{% block content %}
<h2 class="text-center mb-4">Attendance Reports</h2>

<div class="row">
    <div class="col-lg-4 col-md-6 col-12 mb-3">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h5 class="card-title">Daily Report</h5>
                <a href="/daily_report" class="btn btn-primary">View</a>
            </div>
        </div>
    </div>

    <div class="col-lg-4 col-md-6 col-12 mb-3">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h5 class="card-title">Weekly Report</h5>
                <a href="/weekly_report" class="btn btn-success">View</a>
            </div>
        </div>
    </div>

    <div class="col-lg-4 col-md-6 col-12 mb-3">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h5 class="card-title">Monthly Report</h5>
                <a href="/monthly_report" class="btn btn-warning">View</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
