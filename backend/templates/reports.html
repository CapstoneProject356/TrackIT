{% extends "base.html" %}

{% block title %}Reports - TrackIT{% endblock %}

{% block content %}
<h2 class="text-center mb-4">Attendance Reports</h2>

<div class="row">
    <!-- Daily Report -->
    <div class="col-lg-6 col-md-6 col-12 mb-3">
        <div class="card shadow-sm h-100">
            <div class="card-body text-center">
                <h5 class="card-title">Daily Report</h5>
                <a href="/attendance/daily_report" class="btn btn-primary">View</a>
            </div>
        </div>
    </div>

    <!-- Weekly Report -->
    <div class="col-lg-6 col-md-6 col-12 mb-3">
        <div class="card shadow-sm h-100">
            <div class="card-body text-center">
                <h5 class="card-title">Weekly Report</h5>
                <a href="/attendance/weekly_report" class="btn btn-success">View</a>
            </div>
        </div>
    </div>

    <!-- Monthly Report -->
    <div class="col-lg-6 col-md-6 col-12 mb-3">
        <div class="card shadow-sm h-100">
            <div class="card-body text-center">
                <h5 class="card-title">Monthly Report</h5>
                <a href="/attendance/monthly_report" class="btn btn-warning">View</a>
            </div>
        </div>
    </div>

    <!-- Average Report -->
    <div class="col-lg-6 col-md-6 col-12 mb-3">
        <div class="card shadow-sm h-100">
            <div class="card-body text-center">
                <h5 class="card-title">Average Report</h5>
                <a href="/attendance/yearly_report" class="btn btn-danger">View</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
