{% extends "base.html" %}

{% block title %}Weekly Report{% endblock %}

{% block content %}

<h2 class="text-center">Weekly Attendance Report</h2>

<div class="table-responsive">
<table class="table table-bordered mt-4">

    <thead class="table-dark">
        <tr>
            <th>Student Name</th>
            <th>Week</th>
            <th>Attendance %</th>
        </tr>
    </thead>

    <tbody>

    {% for record in records %}

    <tr>
         <td>{{ record.name }}</td>
            <td>{{ record.week }}</td>
            <td>{{ record.percentage }}%</td>
        </tr>



    {% endfor %}

    </tbody>

</table>
    <a href="/attendance/weekly_report/pdf" class="btn btn-success mt-3">
    Download PDF
</a>
</div>

<a href="/reports" class="btn btn-secondary mt-3">Back</a>

{% endblock %}
