{% extends "base.html" %}

{% block title %}Attendance | TrackIT{% endblock %}

{% block content %}
<h2 class="text-center mb-4">Mark Attendance</h2>

<!-- Step 1: GPS Verification -->
<div class="card mb-3 shadow-sm">
    <div class="card-body">
        <h5>Step 1: GPS Verification</h5>
        <button class="btn btn-primary" onclick="verifyGPS()">Check GPS</button>
        <p id="gpsStatus" class="mt-2"></p>
    </div>
</div>

<!-- Step 2: QR Verification -->
<div class="card mb-3 shadow-sm">
    <div class="card-body text-center">
        <h5>Step 2: Scan QR Code</h5>

        <div id="qr-reader" style="width:300px; margin:auto;"></div>
        <button class="btn btn-primary mt-2" onclick="startQRScanner()">Start QR Scanner</button>

        <p class="mt-2">Or upload QR image:</p>
        <input type="file" id="qrFileInput" accept="image/*" onchange="scanQR(this)" />

        <p id="qrStatus" class="mt-2"></p>
    </div>
</div>

<!-- Step 3: Face Verification -->
<div class="card mb-3 shadow-sm">
    <div class="card-body text-center">
        <h5>Step 3: Face Verification</h5>
        <video id="video" width="320" height="240" autoplay playsinline class="border rounded"></video>
        <div class="mt-2">
            <button class="btn btn-success" onclick="captureFace()">Capture Face</button>
        </div>
        <p id="faceStatus" class="mt-2"></p>
        <div id="capturedFaceContainer" class="mt-2"></div>
    </div>
</div>

<!-- Submit Attendance -->
<div class="text-center mt-3">
    <button class="btn btn-primary btn-lg" onclick="markAttendance()">Submit Attendance</button>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="{{ url_for('static', filename='js/attendance.js') }}"></script>
{% endblock %}
