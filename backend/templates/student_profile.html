{% extends "base.html" %}

{% block title %}Student Profile | TrackIT{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2 class="text-center mb-4">My Profile</h2>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <form id="profileForm">
                <div class="mb-3">
                    <label for="studentId" class="form-label">Student ID</label>
                    <input type="text" class="form-control" id="studentId" readonly>
                </div>
                <div class="mb-3">
                    <label for="studentName" class="form-label">Name</label>
                    <input type="text" class="form-control" id="studentName" required>
                </div>
                <div class="mb-3">
                    <label for="studentEmail" class="form-label">Email</label>
                    <input type="email" class="form-control" id="studentEmail" required>
                </div>
                <!-- Optional: subject if you want -->
                <!-- <div class="mb-3">
                    <label for="studentSubject" class="form-label">Subject</label>
                    <input type="text" class="form-control" id="studentSubject">
                </div> -->
                <button type="submit" class="btn btn-primary w-100">Update Profile</button>
            </form>
            <div class="mt-3" id="profileMsg"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", async () => {
    // Fetch current student profile
    const res = await fetch("/student/profile/get");
    const data = await res.json();

    if (data.error) {
        document.getElementById("profileMsg").innerText = data.error;
        return;
    }

    document.getElementById("studentId").value = data.id;
    document.getElementById("studentName").value = data.name;
    document.getElementById("studentEmail").value = data.email;
    // document.getElementById("studentSubject").value = data.subject || "";
});

// Handle profile update
document.getElementById("profileForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData();
    formData.append("name", document.getElementById("studentName").value);
    formData.append("email", document.getElementById("studentEmail").value);
    // formData.append("subject", document.getElementById("studentSubject").value);

    const res = await fetch("/student/profile/update", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    const msgEl = document.getElementById("profileMsg");
    if (data.success) {
        msgEl.className = "text-success mt-2";
        msgEl.innerText = "Profile updated successfully ✅";
    } else {
        msgEl.className = "text-danger mt-2";
        msgEl.innerText = "Error: " + (data.error || "Could not update profile");
    }
});
</script>
{% endblock %}
