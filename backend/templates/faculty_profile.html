{% extends "base.html" %}

{% block title %}Faculty Profile | TrackIT{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="text-center mb-4">Faculty Profile</h2>

    <div class="card p-4 shadow">
        <form id="profileForm">
            <div class="mb-3">
                <label for="facultyId" class="form-label">Faculty ID</label>
                <input type="text" class="form-control" id="facultyId" name="id" readonly>
            </div>
            <div class="mb-3">
                <label for="facultyName" class="form-label">Name</label>
                <input type="text" class="form-control" id="facultyName" name="name" required>
            </div>
            <div class="mb-3">
                <label for="facultyEmail" class="form-label">Email</label>
                <input type="email" class="form-control" id="facultyEmail" name="email" required>
            </div>
            

            <button type="submit" class="btn btn-primary">Update Profile</button>
        </form>
        <div id="profileMsg" class="mt-3"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", async () => {

    // Load current profile
    const res = await fetch("/faculty/profile/get");
    const data = await res.json();

    document.getElementById("facultyId").value = data.id;
    document.getElementById("facultyName").value = data.name;
    document.getElementById("facultyEmail").value = data.email;
    //document.getElementById("facultySubject").value = data.subject;
});

// Handle form submission
document.getElementById("profileForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);

    const res = await fetch("/faculty/profile/update", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    const msgEl = document.getElementById("profileMsg");
    if (data.success) {
        msgEl.className = "alert alert-success";
        msgEl.innerText = "Profile updated successfully!";
    } else {
        msgEl.className = "alert alert-danger";
        msgEl.innerText = data.error || "Update failed!";
    }
});
</script>
{% endblock %}
