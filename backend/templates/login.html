{% extends "base.html" %}

{% block title %}Login | TrackIT{% endblock %}

{% block content %}

<div class="card shadow col-md-6 mx-auto mt-5">
    <div class="card-body">

<h3 id="formTitle" class="text-center mb-4">Login</h3>


        <!-- LOGIN -->
        <div id="loginForm">

            <input id="loginEmail" class="form-control mb-3" placeholder="Email">
            <input id="loginPassword" type="password" class="form-control mb-3" placeholder="Password">

            <button type="button" class="btn btn-primary w-100" onclick="login()">Login</button>

            <p class="text-center mt-3">
                New user? <a href="#" onclick="showRegister(event)">Register here</a>
            </p>

        </div>

        <!-- REGISTER -->
        <div id="registerForm" style="display:none">
            <!-- ROLE --> <select id="role" class="form-select mb-3" onchange="toggleRoleFields()"> <option value="student">Student</option> <option value="faculty">Faculty</option> <option value="admin">Admin</option> </select>

            <input id="regName" class="form-control mb-2" placeholder="Full Name">
            <input id="regEmail" class="form-control mb-2" placeholder="Email">
            <input id="regPassword" type="password" class="form-control mb-2" placeholder="Password">

            <!-- STUDENT -->
            <div id="studentFields">

                <input id="regRoll" class="form-control mb-2" placeholder="Roll Number">
                <select id="regDept" class="form-select mb-2">
                     <option value="">Select Department</option>
                     <option value="CO">CO</option>
                     <option value="IT">IT</option>
                     <option value="ME">ME</option>
                     <option value="CE">CE</option>
                     <option value="EE">EE</option>
                     <option value="EJ">EJ</option>
                </select>
                <select id="regClass" class="form-select mb-2">
                  <option value="">Select Class</option>
                  <option value="FY">First Year (FY)</option>
                  <option value="SY">Second Year (SY)</option>
                  <option value="TY">Third Year (TY)</option>
                </select>
                <label class="mt-2">Register Face</label>

                <video id="video" width="100%" height="200" autoplay class="border rounded"></video>
                <canvas id="canvas" style="display:none;"></canvas>

                <button type="button" class="btn btn-secondary w-100 mt-2" onclick="captureFace()">Capture Face</button>

                <div id="capturedFaceContainer" class="mt-2"></div>

                <input type="hidden" id="faceImage">

            </div>

            <!-- FACULTY -->
            <div id="facultyFields" style="display:none">

                <input id="regEmpId" class="form-control mb-2" placeholder="Employee ID">
                <input id="regSubject" class="form-control mb-2" placeholder="Subject">

            </div>

            <!-- ADMIN -->
            <div id="adminFields" style="display:none">

                <input id="regAdminKey" class="form-control mb-2" placeholder="Admin Secret Key">

            </div>

            <button type="button" class="btn btn-success w-100 mt-2" onclick="register()">Register</button>

            <p class="text-center mt-3">
                Already have an account? <a href="#" onclick="showLogin(event)">Login here</a>
            </p>

        </div>

    </div>
</div>

{% endblock %}

{% block scripts %}

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>

<script>

let video

document.addEventListener("DOMContentLoaded", function(){

    video = document.getElementById("video")

    toggleRoleFields()

})


// SWITCH TO REGISTER
function showRegister(e){

    e.preventDefault()

    document.getElementById("loginForm").style.display = "none"
    document.getElementById("registerForm").style.display = "block"

    toggleRoleFields()
}


// SWITCH TO LOGIN
function showLogin(e){

    e.preventDefault()

    document.getElementById("registerForm").style.display = "none"
    document.getElementById("loginForm").style.display = "block"

}


// START CAMERA
function startCamera(){

    navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {

        video.srcObject = stream

    })
    .catch(err => {

        alert("Camera access denied")

        console.log(err)

    })

}


// CAPTURE FACE
function captureFace(){

    let canvas = document.getElementById("canvas")
    let context = canvas.getContext("2d")

    canvas.width = video.videoWidth
    canvas.height = video.videoHeight

    context.drawImage(video, 0, 0)

    let imageData = canvas.toDataURL("image/png")

    document.getElementById("faceImage").value = imageData

    let container = document.getElementById("capturedFaceContainer")

    container.innerHTML = "<img src='"+imageData+"' width='150' class='mt-2 border rounded'>"

    alert("Face captured successfully")

}


// ROLE SWITCH
function toggleRoleFields(){

    let role = document.getElementById("role").value

    document.getElementById("studentFields").style.display = role==="student" ? "block" : "none"
    document.getElementById("facultyFields").style.display = role==="faculty" ? "block" : "none"
    document.getElementById("adminFields").style.display = role==="admin" ? "block" : "none"

    if(role === "student"){
        startCamera()
    }

}


// LOGIN FUNCTION
function login(){

    let email = document.getElementById("loginEmail").value
    let password = document.getElementById("loginPassword").value
    let role = document.getElementById("role").value

    if(email === "" || password === ""){
        alert("Please enter email and password")
        return
    }

    console.log("Login attempt:", email, password, role)

    alert("Login button working (connect to backend API)")

}


// REGISTER FUNCTION
function register(){

    let name = document.getElementById("regName").value
    let email = document.getElementById("regEmail").value
    let password = document.getElementById("regPassword").value
    let role = document.getElementById("role").value

    if(name === "" || email === "" || password === ""){
        alert("Please fill required fields")
        return
    }

    if(role === "student"){

        let roll = document.getElementById("regRoll").value
        let dept = document.getElementById("regDept").value
        let studentClass = document.getElementById("regClass").value
        let face = document.getElementById("faceImage").value

        if(roll === "" || dept === "" || face === ""){
            alert("Please complete student details and capture face")
            return
        }

    }

    alert("Register button working (connect to backend API)")

}

</script>

{% endblock %}
