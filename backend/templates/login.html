{% block scripts %}

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>

<script>

let video = document.getElementById("video")

// Start camera
function startCamera(){
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
        video.srcObject = stream
    })
}

// Capture face
function captureFace(){

    let canvas = document.getElementById("canvas")
    let context = canvas.getContext("2d")

    canvas.width = video.videoWidth
    canvas.height = video.videoHeight

    context.drawImage(video, 0, 0)

    let imageData = canvas.toDataURL("image/png")

    // store image for registration
    document.getElementById("faceImage").value = imageData

    // show preview
    let container = document.getElementById("capturedFaceContainer")
    container.innerHTML = "<img src='"+imageData+"' width='150' class='mt-2 border rounded'>"

    alert("Face captured successfully")
}

// Show fields based on role
function toggleRoleFields(){

    let role = document.getElementById("role").value

    document.getElementById("studentFields").style.display = role==="student" ? "block" : "none"
    document.getElementById("facultyFields").style.display = role==="faculty" ? "block" : "none"
    document.getElementById("adminFields").style.display = role==="admin" ? "block" : "none"

    if(role === "student"){
        startCamera()
    }
}

</script>
